version: '3.8'

# Imobiliária Sandra — Stack completo
# Deploy: docker compose up -d --build
# Atualização: docker compose exec backend python scrape_runner.py --scope nacional

services:
  # ─── Backend (imoveis-app FastAPI) ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: imobiliaria-backend
    restart: unless-stopped
    volumes:
      - backend_data:/app/data          # BD SQLite persistente
      - backend_logs:/app/logs          # Logs de scraping
    ports:
      - "127.0.0.1:8000:8000"          # Só localhost (nginx faz proxy)
    environment:
      - TZ=Europe/Lisbon
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/stats"]
      interval: 60s
      timeout: 10s
      retries: 3

  # ─── Frontend (Next.js) ───
  frontend:
    build:
      context: ../app/frontend
      dockerfile: Dockerfile
    container_name: imobiliaria-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"          # Só localhost (nginx faz proxy)
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NODE_ENV=production
      - TZ=Europe/Lisbon
    depends_on:
      backend:
        condition: service_healthy

  # ─── Nginx (reverse proxy + SSL) ───
  nginx:
    image: nginx:alpine
    container_name: imobiliaria-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend

  # ─── Certbot (SSL automático) ───
  certbot:
    image: certbot/certbot
    container_name: imobiliaria-certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Renovação automática via cron externo:
    # 0 3 * * 1 docker compose run --rm certbot renew && docker compose exec nginx nginx -s reload
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h; done;'"

volumes:
  backend_data:
    name: imobiliaria_backend_data
  backend_logs:
    name: imobiliaria_backend_logs
  certbot_conf:
    name: imobiliaria_certbot_conf
  certbot_www:
    name: imobiliaria_certbot_www
