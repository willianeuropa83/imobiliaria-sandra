# Imobiliária Sandra — imobiliaria.comprasvalore.com.br
# Passo 1: Arrancar SEM SSL (para obter o certificado)
# Passo 2: Correr certbot e activar o bloco SSL

# ─── Upstream servers ───
upstream frontend {
    server frontend:3000;
}
upstream backend {
    server backend:8000;
}

# ─── HTTP (porta 80) ───
server {
    listen 80;
    server_name imobiliaria.comprasvalore.com.br;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirecionar tudo para HTTPS (activar DEPOIS do certbot)
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # Enquanto não há SSL, servir directamente:
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # API do backend
    location /api/ {
        proxy_pass http://backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache para API de listagem
        proxy_cache_valid 200 5m;
    }
}

